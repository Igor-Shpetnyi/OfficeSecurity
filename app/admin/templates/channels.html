{% extends "base.html" %}
{% block title %}Канали — Безпека Офісу{% endblock %}
{% block breadcrumb %}Канали{% endblock %}
{% block content %}
<h1 class="page-title">Моніторинг-канали</h1>
<p class="page-subtitle">Керування списком Telegram-каналів для інжесту</p>

<div class="card">
  <form method="post" action="/channels" class="inline-form">
    <input class="input" name="channel_identifier" placeholder="@username або invite-hash" required>
    <select class="input" name="identifier_type">
      <option value="username">Публічний (@username)</option>
      <option value="invite">Приватний (invite-hash)</option>
    </select>
    <button type="submit" class="btn btn-primary">Додати</button>
  </form>

  <div id="channels-content">
    {% include "_channels_content.html" %}
  </div>
</div>

<script src="/static/js/live-refresh.js"></script>
<script>startLiveRefresh('channels-content', '/channels/fragment', 5000);</script>
{% endblock %}
