# Вулиці Сум — офіційний реєстр Сумської міської ради.
# Джерело: https://smr.gov.ua/uk/dovidka/reestr-nazv-vulits-ta-provulkiv.html
# Витягнуто: 2026-07-21. name — чинна (актуальна) назва; old_name — попередня
# назва до перейменування (декомунізація/дерусифікація), якщо застосовно —
# в реальних повідомленнях канали іноді досі вживають стару назву за звичкою.
#
# НАВІЩО ОКРЕМИЙ ФАЙЛ від toponyms.yaml: влучання по вулиці В САМИХ Сумах —
# набагато пряміший і критичніший сигнал для офісу, ніж згадка районного
# центру, тому вартий власної категорії, а не змішування з районним газетиром.
#
# ВАЖЛИВО — ще НЕ підключено до app/common/lexicon.py: багато назв вулиць —
# звичайні українські слова ("Соснова", "Весняна", "Гостинна") і навпаки,
# частина буквально збігається з районними топонімами з toponyms.yaml
# (Білопільська/Охтирська/Хотінська/Тополянська/Баранівська тощо — та сама
# проблема, що й colission у toponyms.yaml, обговорена і свідомо відкладена
# 2026-07-21). Пряме входження-підрядок тут дасть масу хибних спрацювань.
# Підключення вимагає окремої логіки: матчити вулицю лише в парі з маркером
# "вул."/"вулиця"/"на вулиці" перед назвою, не голим підрядком — наступний крок.

