# Словник тригерів — ЧЕРНЕТКА, потребує звірки користувачем перед продакшн-використанням
# (див. backlog/open-questions.md, сесія 2026-07-21). Зібрано з прямого аналізу
# 9917 реальних повідомлень за 7 днів — не з оригінального розділу 5 вихідного
# ТЗ, якого немає в репозиторії.
#
# Кожен запис — підрядок (стем), що шукається в НОРМАЛІЗОВАНОМУ (lowercase)
# тексті повідомлення. Стем навмисно короткий, щоб ловити відмінкові форми
# одним записом (напр. "тривог" ловить тривога/тривоги/тривозі/тривогу).
#
# level: найвищий рівень з таблиці ТЗ §6/§7 (🟢 green / 🟡 yellow / 🟠 orange / 🔴 red).
# status: НЕ рівень загрози — маркер зміни стану (відбій/втрата фіксації/
# нейтралізація), обробляється окремо від рівня в app/common/lexicon.py.
#
# ВІДОМЕ ОБМЕЖЕННЯ (аудит 2026-07-21, підтверджено на живих даних двічі):
# "тривог" ловить БУДЬ-яку згадку слова "тривога" — і оголошення, і відбій,
# і просто пояснювальний/PSA-текст ("не ігноруйте сигнали тривоги", опис
# роботи системи оповіщення). Пара з status="відбій" гаситься на рівні
# handlers.py (level не показується, якщо є status), але PSA-текст без
# жодного status-слова лишається хибним red. Дешевого фіксу немає без
# втрати recall — саме цей клас неоднозначності мав вирішувати Рівень 3
# (LLM), не Рівень 1. Не намагатись латати спеціальними правилами під
# конкретні фрази — це буде нескінченна гонитва.

red:
  - "тривог"       # повітряна тривога / оголошена тривога
  - "тревог"        # російськомовний варіант — канали іноді пишуть змішаною мовою
  - "балістик"
  - "вибух"
  - "приліт"
  - "прильот"
  - "влучанн"
  - "укритт"        # наказ ховатись — супроводжує вже активну загрозу
  - "обстріл"

orange:
  - "бпла"           # без уточнення типу — ТЗ §6: "Невідомі БпЛА трактуються як потенційно ударні"
  - "шахед"
  - "герань"
  - "каб"
  - "ракет"
  - "рсзв"
  - "фпв"
  - "fpv"
  - "молні"         # Molniya — малий ударний БпЛА/дрон дальньої дії
  - "ланцет"
  - "наліт"
  - "авіаці"         # активність тактичної авіації
  - "т/а"             # сленгове скорочення "тактична авіація"
  - "реактивн"       # "реактивний БпЛА" — швидкісна ціль
  - "швидкісн"
  - "невідом"        # "невідомий БпЛА" — нижча довіра, але все ще активна ціль
  - "дроч"            # сленг: невизначена/декой-ціль (низька довіра)
  - "болванк"         # синонім "дроч"
  - "уєбало"           # груба сленгова форма "влучило/вибухнуло"
  - "в'єбеніло"

yellow:
  - "зала"       # Zala — розвідувальний БпЛА, передує удару (ТЗ §6)
  - "орлан"
  - "supercam"

status:
  - "відбій"
  - "не фіксується"    # ціль втрачена — окремо від голого "фіксується" (може означати "ще виявляється")
  - "без фіксації"
  - "чисто"
  - "знищено"
  - "збито"
  - "збиття"
