# Газетир топонімів Сумщини — ЧЕРНЕТКА, потребує звірки користувачем перед
# продакшн-використанням. Зібрано з прямого аналізу реальних повідомлень за
# 7 днів (fuzzy-кластеризація власних назв, TZ_konveyer_analizu_zagroz.md
# розділ 3). НЕ вичерпний список населених пунктів області — лише ті, що
# реально фігурували в даних цього тижня.
#
# forms — усі словоформи, знайдені в даних (не повна граматична парадигма).
# Якщо форма не знайдена буквально — app/common/lexicon.py падає на
# fuzzy-match (difflib) проти canonical.
#
# tier — гео-релевантність для фільтра "виключно для мешканців Сум"
# (lexicon.is_geo_relevant, доданий 2026-07-24, запит користувача):
#   city   — саме м. Суми / орієнтир у місті
#   oblast — населені пункти Сумщини — релевантні САМІ ПО СОБІ, без потреби
#            згадувати "Суми"/напрямок явно (уточнення користувача 2026-07-24:
#            повідомлення з каналів не завжди називають місто)
#   source — регіон/область, звідки летить загроза, а не ціль сама по собі
#            (уже позначені окремим коментарем нижче) — рахуються релевантними
#            тільки якщо в тексті ще й є фраза напрямку (lexicon.match_direction)
#
# Свідомо НЕ вся Україна: інші області (Донеччина, Запоріжжя, Одещина тощо)
# не потрапляють у газетир навіть попри те, що "Повітряні Сили ЗС України"
# репортують по них теж — вони не впливають на каскад загроз офісу в Сумах.
# Підтверджено користувачем 2026-07-21, не re-litigate без нового приводу.

